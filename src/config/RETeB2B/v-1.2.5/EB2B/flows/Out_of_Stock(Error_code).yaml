              type: string
              description: Retailer shop name
            address:
              type: string
              description: Retailer address
            city_code:
              type: string
              description: City code
            state_code:
              type: string
              description: State code (default KA)
            items:
              type: array
              minItems: 2
              maxItems: 4
              default: []
              items:
                type: object
                additionalProperties: true
                properties:
                  itemId:
                    type: string
                    default: I1
                  quantity:
                    type: number
                    default: 1
                    minimum: 1
                  location:
                    type: string
                    default: L1
                  fulfillment_id:
                    type: string
                    description: Fulfillment ID (e.g., F1, F2)
                    default: F1
                default: {}
          required:
            - type
            - city_code
          allOf:
            - if:
                properties:
                  type:
                    const: new
              then:
                required:
                  - phone_number
                  - email
                  - tax_number
                  - provider_tax_number
                  - shop_name
                  - address
                  - state_code
