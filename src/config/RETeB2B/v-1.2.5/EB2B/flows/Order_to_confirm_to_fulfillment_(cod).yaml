              maxItems: 5
              items:
                type: object
                properties:
                  itemId:
                    type: string
                    title: Item
                    default: I1
                  quantity:
                    type: number
                    title: Quantity
                    minimum: 1
                    default: 1
                  location:
                    type: string
                    title: Location
                    default: L1
                  fulfillment_id:
                    type: string
                    title: Fulfillment
                    default: F1
                required:
                  - itemId
                  - quantity
            available_offers:
              type: array
              title: 🎁 available_offers
              description: Click 'Add Offer' to apply promotions
              minItems: 0
              maxItems: 5
              items:
                type: object
                properties:
                  offerId:
                    type: string
                    title: Select Offer
                    oneOf:
                      - const: discp10
                        title: 10% Discount (discp10)
                      - const: flat150
                        title: Flat ₹150 Off (flat150)
                      - const: slab1
                        title: 15% Bulk Slab (slab1)
                      - const: slab2
                        title: 10% High Volume (slab2)
                      - const: freebie1
                        title: Free Gift (freebie1)
                      - const: buy2get3
