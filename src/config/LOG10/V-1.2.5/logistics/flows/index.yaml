      - Appliances
      - Home & Kitchen
      - Health & Wellness
      - Pharma
      - Auto components
      - C2C parcels
    - name: category
      label: Select a category
      type: select
      values:
      - Standard Delivery
      - Next Day Delivery
      - Same Day Delivery
      payloadField: $.message.intent.category.id
